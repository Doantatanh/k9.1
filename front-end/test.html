<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Menu Widget</title>
    
    <!-- Google Font: Public Sans (Font chủ đạo trong style của bạn) -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap v5.1.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 (Như trong file style) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- TRÍCH XUẤT TỪ FILE STYLE BẠN CUNG CẤP & TÙY CHỈNH THEO ẢNH --- */
        :root {
            /* Cập nhật mã màu Cam/Đỏ theo ảnh đính kèm */
            --theme-color: #c13407; 
            --theme-color-rgb: 193, 52, 7;
            --theme-color2: #d94a1a;
            --text-content: #4a5568;
            --bg-light: #f9ebe7; /* Màu nền hồng nhạt phía trên */
        }

        body {
            font-family: "Public Sans", sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
        }

        /* Card Wrapper */
        .user-widget-card {
            max-width: 360px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: 0 auto;
        }

        /* Top Header Section */
        .user-header {
            background-color: var(--bg-light);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .user-header h5 {
            margin: 0;
            font-weight: 700;
            font-size: 16px;
            color: #222;
        }

        .login-badge {
            display: inline-block;
            background: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--theme-color);
            margin-top: 5px;
            font-weight: 500;
        }

        /* Button Styles trích từ logic của bạn */
        .btn-animation {
            background: var(--theme-color);
            color: #fff !important;
            border: none;
            font-weight: 600;
            padding: 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        
        .btn-animation:hover {
            background: var(--theme-color2);
            transform: translateY(-2px);
        }

        .btn-theme-outline {
            color: var(--theme-color);
            border: 1px solid var(--theme-color);
            background: #fff;
            font-weight: 600;
            padding: 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-theme-outline:hover {
            background: var(--theme-color);
            color: #fff !important;
        }

        /* Stats Section */
        .stats-box {
            padding: 20px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .stat-item {
            text-align: center;
            border-right: 1px solid #f1f1f1;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-value {
            font-weight: 700;
            font-size: 18px;
            color: #222;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-content);
            line-height: 1.2;
            margin-top: 2px;
            display: block;
        }

        .text-yellow {
            color: #faba02 !important;
        }

        /* Bottom Links Section */
        .footer-links {
            padding: 15px 20px;
        }

        .link-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .link-tabs a {
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            position: relative;
        }

        .link-tabs a.active {
            color: var(--theme-color);
        }

        /* Gạch chân dưới link active giống trong ảnh */
        .link-tabs a.active::after {
            content: "";
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--theme-color);
            border-radius: 2px;
        }

        .promo-note {
            font-size: 13px;
            color: var(--text-content);
            margin: 0;
        }

        /* Utility từ file style */
        .fw-bold { font-weight: 700 !important; }
    </style>
</head>
<body>

    <div class="user-widget-card">
        <!-- Header -->
        <div class="user-header">
            <div class="avatar">
                <!-- Thay link ảnh thật vào đây -->
                <img src="https://i.imgur.com/8Km9tLL.png" alt="User Avatar">
            </div>
            <div class="info">
                <h5>Xin chào quý khách!</h5>
                <div class="login-badge">Đăng nhập và mua sắm ngay thôi</div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="p-3 border-bottom">
            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-animation w-100">Đăng nhập</button>
                </div>
                <div class="col-6">
                    <button class="btn btn-theme-outline w-100">Đăng ký</button>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-box">
            <div class="row g-0">
                <div class="col-3 stat-item">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Đơn hàng mới</span>
                </div>
                <div class="col-3 stat-item">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Đang vận chuyển</span>
                </div>
                <div class="col-3 stat-item">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Hoàn thành</span>
                </div>
                <div class="col-3 stat-item border-0">
                    <span class="stat-value text-yellow">0</span>
                    <span class="stat-label">Điểm của bạn</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-links">
            <div class="link-tabs">
                <a href="#" class="active">Khuyến mãi dành cho bạn</a>
                <a href="#">Thông tin bảo hành</a>
            </div>
            <p class="promo-note">Quý khách vui lòng đăng nhập để xem ưu đãi!</p>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
