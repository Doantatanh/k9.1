<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fastkart">
    <meta name="keywords" content="Fastkart">
    <meta name="author" content="Fastkart">
    <link rel="icon" href="../assets/images/favicon/1.png" type="image/x-icon">
    <title>On-demand last-mile delivery</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.gstatic.com/">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap">

    <!-- bootstrap css -->
    <link id="rtl-link" rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Iconly css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/bulk-style.css">

    <!-- Template css -->
    <link id="color-link" rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="theme-color-5">

    <!-- Loader Start -->
    <div class="fullpage-loader">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    <!-- Loader End -->

    <!-- log in section start -->
    <section class="log-in-section background-image-2 section-b-space" style="background-color: #f5f5f5;">
        <div class="container-fluid-lg w-100">
            <div class="row min-vh-100 d-flex justify-content-center align-items-center">
                <div class="col-xxl-4 col-xl-5 col-lg-6 col-sm-8 mx-auto">
                    <div class="log-in-box p-3 shadow-container" style="background-color: #fff;">
                        <div class="flex justify-center mb-8">
                            <div class="d-flex justify-content-center mb-3"><a class="" href="/"><img
                                        src="/assets/images/logo/Logo transparent copy.png" class="" height="90"
                                        width="213" style="max-height: 90px; min-height: 90px;" data-loaded="true"></a>
                            </div>
                            <div></div>
                        </div>

                        <div class="input-box">
                            <form class="row g-4">
                                <div class="col-12">
                                    <div class="form-floating theme-form-floating log-in-form border-gray-10">
                                        <input type="email" class="form-control  border-gray-10" id="email"
                                            placeholder="Địa chỉ Email">
                                        <label for="email">Địa chỉ Email</label>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-floating theme-form-floating log-in-form  border-gray-10">
                                        <input type="password" class="form-control  border-gray-10" id="password"
                                            placeholder="Mật khẩu">
                                        <label for="password">Mật khẩu</label>
                                    </div>
                                </div>

                                <div class="col-12 d-flex justify-content-between align-items-center">
                                    <div class="forgot-box">
                                        <a href="forgot.html" class="forgot-password">Quên mật khẩu?</a>
                                    </div>
                                    <div class="sign-up-box1">
                                        <a href="sign-up.html" class="sign-up-password">Đăng ký tài khoản</a>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <button class="btn btn-animation w-100 justify-content-center border-10 btn-login1"
                                        type="submit">Đăng
                                        nhập</button>
                                </div>
                            </form>
                        </div>

                        <div class="other-log-in">
                            <h6>Hoặc</h6>
                        </div>

                        <div class="log-in-button">
                            <ul>
                                <li>
                                    <a href="https://www.google.com/"
                                        class="btn google-button w-100 font-normal border-10"
                                        style="background-color: #ededed;">
                                        <img src="../assets/images/inner-page/google.png" class="blur-up lazyload"
                                            alt="">
                                        Đăng nhập với Google
                                    </a>
                                </li>
                            </ul>
                        </div>


                        <div class="sign-up-box">
                            <a href="/" class="input-content--subdued underline keep-underline">
                                <h4>Quay lại tiếp tục mua hàng</h4>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- log in section end -->


    <!-- latest jquery-->
    <script src="../assets/js/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/bootstrap/popper.min.js"></script>

    <!-- feather icon js-->
    <script src="../assets/js/feather/feather.min.js"></script>
    <script src="../assets/js/feather/feather-icon.js"></script>

    <!-- Slick js-->
    <script src="../assets/js/slick/slick.js"></script>
    <script src="../assets/js/slick/slick-animation.min.js"></script>
    <script src="../assets/js/slick/custom_slick.js"></script>

    <!-- Lazyload Js -->
    <script src="../assets/js/lazysizes.min.js"></script>

    <!-- script js -->
    <script src="../assets/js/script.js"></script>

    <!-- search-redirect.js -->
    <script src="../assets/js/search-redirect.js"></script>
</body>

</html>
